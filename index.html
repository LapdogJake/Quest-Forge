<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quest-Forge</title>
  <!-- Supabase JS Client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --primary: #8b5cf6;
      --text: #ffffff;
      --text-muted: #a1a1aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding-bottom: 70px;
    }
    header {
      padding: 16px;
      background: var(--card-bg);
      border-bottom: 1px solid #27272a;
      text-align: center;
    }
    .container { padding: 16px; }
    .card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #27272a;
      margin-bottom: 16px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #3f3f46;
      background: #27272a;
      color: white;
      font-size: 16px;
    }
    button {
      background: var(--primary);
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: var(--card-bg);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #27272a;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Quest-Forge</h1>
  </header>

  <main class="container">
    <!-- Auth Card -->
    <div id="auth-section" class="card">
      <h2>Account Login</h2>
      <input type="email" id="email" placeholder="Email Address">
      <input type="password" id="password" placeholder="Password">
      <button onclick="handleSignUp()">Sign Up</button>
      <button onclick="handleSignIn()" style="background:#3f3f46; margin-top:8px;">Sign In</button>
      <p id="auth-status" style="margin-top:8px; color:var(--text-muted); font-size:14px;"></p>
    </div>

    <!-- Dashboard Card (Visible after login) -->
    <div id="dashboard-section" class="card hidden">
      <h2>Player Profile</h2>
      <p id="user-display" style="margin-top:8px;"></p>
      <button onclick="handleSignOut()" style="background:#ef4444; margin-top:16px;">Sign Out</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <span>Quests</span>
    <span>Profile</span>
    <span>Bestiary</span>
  </nav>

  <script>
    // Live Supabase Project Credentials
    const SUPABASE_URL = "https://evsknkezkbramsnzisvn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3f9t-xXsEqWntgPm9fz-ow_m7fMVt5b";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Auth Handlers
    async function handleSignUp() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const status = document.getElementById('auth-status');
      status.innerText = "Creating account...";

      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) status.innerText = error.message;
      else status.innerText = "Check your email for verification, or sign in!";
    }

    async function handleSignIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const status = document.getElementById('auth-status');
      status.innerText = "Signing in...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        status.innerText = error.message;
      } else {
        updateUI(data.user);
      }
    }

    async function handleSignOut() {
      await supabaseClient.auth.signOut();
      updateUI(null);
    }

    function updateUI(user) {
      if (user) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('user-display').innerText = "Logged in as: " + user.email;
      } else {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
      }
    }

    // Check existing session on load
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) updateUI(session.user);
    });
  </script>
</body>
</html>
