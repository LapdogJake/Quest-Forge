<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quest-Forge | Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #121212; --card-bg: #1e1e1e; --primary: #8b5cf6; --text: #ffffff; --text-muted: #a1a1aa; --border: #27272a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; padding-bottom: 70px; }
    header { padding: 16px; background: var(--card-bg); border-bottom: 1px solid var(--border); text-align: center; }
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; }
    button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #ef4444; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--card-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <header><h1>Quest-Forge</h1></header>

  <main class="container">
    <div id="dashboard-card" class="card">
      <h2>Player Profile</h2>
      <p id="user-display" style="margin-top:8px; font-weight: bold; color: var(--primary); font-size: 20px;">Loading...</p>
      
      <div style="margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background:#27272a; padding:12px; border-radius:8px; text-align:center;">
          <small style="color:var(--text-muted)">Gold</small>
          <p id="profile-gold" style="font-size:22px; font-weight:bold;">0</p>
        </div>
        <div style="background:#27272a; padding:12px; border-radius:8px; text-align:center;">
          <small style="color:var(--text-muted)">Quest Points</small>
          <p id="profile-qp" style="font-size:22px; font-weight:bold;">0</p>
        </div>
      </div>

      <button onclick="handleSignOut()">Sign Out</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <span>Quests</span>
    <span>Profile</span>
    <span>Bestiary</span>
  </nav>

  <script>
    const SUPABASE_URL = "https://evsknkezkbramsnzisvn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3f9t-xXsEqWntgPm9fz-ow_m7fMVt5b";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function initDashboard() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      // If no user is logged in, redirect straight to login.html
      if (!session) {
        window.location.href = "login.html";
        return;
      }

      // Load profile stats
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', session.user.id)
        .single();

      const displayName = profile?.username || session.user.user_metadata?.username || session.user.email;
      document.getElementById('user-display').innerText = displayName;
      document.getElementById('profile-gold').innerText = profile?.gold || 0;
      document.getElementById('profile-qp').innerText = profile?.quest_points || 0;
    }

    async function handleSignOut() {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    }

    initDashboard();
  </script>
</body>
</html>
