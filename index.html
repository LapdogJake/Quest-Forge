<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quest-Forge</title>
  <!-- Supabase JS Client library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --border: #27272a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding-bottom: 70px;
    }
    header {
      padding: 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .container { padding: 16px; }
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #27272a;
      color: white;
      font-size: 16px;
    }
    button {
      background: var(--primary);
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active { background: var(--primary-hover); }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: var(--card-bg);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid var(--border);
    }
    .status-msg {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
    }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Quest-Forge</h1>
  </header>

  <main class="container">
    <!-- Auth Card -->
    <div id="auth-section" class="card">
      <h2 id="auth-title">Account Login / Sign Up</h2>
      
      <input type="text" id="username" placeholder="Character Name (e.g. Sir Robin)">
      <input type="email" id="email" placeholder="Email Address">
      <input type="password" id="password" placeholder="Password">
      
      <button onclick="handleSignUp()">Create Account</button>
      <button onclick="handleSignIn()" style="background:#3f3f46;">Log In</button>
      
      <div id="auth-status" class="status-msg"></div>
    </div>

    <!-- Profile Dashboard (Visible after login) -->
    <div id="dashboard-section" class="card hidden">
      <h2>Player Profile</h2>
      <p id="user-display" style="margin-top:8px; font-weight: bold; color: var(--primary);"></p>
      
      <div style="margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background:#27272a; padding:12px; border-radius:8px; text-align:center;">
          <small style="color:var(--text-muted)">Gold</small>
          <p id="profile-gold" style="font-size:20px; font-weight:bold;">0</p>
        </div>
        <div style="background:#27272a; padding:12px; border-radius:8px; text-align:center;">
          <small style="color:var(--text-muted)">Quest Points</small>
          <p id="profile-qp" style="font-size:20px; font-weight:bold;">0</p>
        </div>
      </div>

      <button onclick="handleSignOut()" style="background:#ef4444; margin-top:20px;">Sign Out</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <span>Quests</span>
    <span>Profile</span>
    <span>Bestiary</span>
  </nav>

  <script>
    const SUPABASE_URL = "https://evsknkezkbramsnzisvn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3f9t-xXsEqWntgPm9fz-ow_m7fMVt5b";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleSignUp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value.trim();
      const status = document.getElementById('auth-status');

      if (!email || !password || !username) {
        status.className = "status-msg error";
        status.innerText = "Please fill in all fields (Character Name, Email, Password).";
        return;
      }

      status.className = "status-msg";
      status.innerText = "Creating account...";

      // 1. Create auth user with username metadata
      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          data: { username: username }
        }
      });

      if (error) {
        status.className = "status-msg error";
        status.innerText = error.message;
      } else {
        status.className = "status-msg success";
        status.innerText = "Account created! Signing you in...";
        // Auto sign in after registration
        handleSignIn();
      }
    }

    async function handleSignIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const status = document.getElementById('auth-status');

      status.className = "status-msg";
      status.innerText = "Logging in...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) {
        status.className = "status-msg error";
        status.innerText = error.message;
      } else {
        loadUserProfile(data.user);
      }
    }

    async function loadUserProfile(user) {
      // Fetch profile stats from database
      const { data: profile, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

      updateUI(user, profile);
    }

    async function handleSignOut() {
      await supabaseClient.auth.signOut();
      updateUI(null, null);
    }

    function updateUI(user, profile) {
      if (user) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        const displayName = profile?.username || user.user_metadata?.username || user.email;
        document.getElementById('user-display').innerText = "Welcome, " + displayName;
        document.getElementById('profile-gold').innerText = profile?.gold || 0;
        document.getElementById('profile-qp').innerText = profile?.quest_points || 0;
      } else {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('auth-status').innerText = "";
      }
    }

    // Check existing session on load
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) loadUserProfile(session.user);
    });
  </script>
</body>
</html>
