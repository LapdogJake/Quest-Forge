<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quest-Forge | Log In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #121212; --card-bg: #1e1e1e; --primary: #8b5cf6; --text: #ffffff; --text-muted: #a1a1aa; --border: #27272a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    header { padding: 16px; background: var(--card-bg); border-bottom: 1px solid var(--border); text-align: center; }
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 24px 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }
    .field-group { margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #3f3f46; background: #27272a; color: white; font-size: 16px; }
    button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .link-text { margin-top: 16px; text-align: center; font-size: 14px; color: var(--text-muted); }
    .link-text a { color: var(--primary); font-weight: bold; text-decoration: underline; }
    .status-msg { margin-top: 12px; font-size: 14px; text-align: center; color: #f87171; }
  </style>
</head>
<body>

  <header><h1>Quest-Forge</h1></header>

  <main class="container">
    <div class="card">
      <h2 style="margin-bottom: 16px;">Log In</h2>
      
      <div class="field-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="hero@example.com">
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      
      <button onclick="handleSignIn()">Log In</button>
      <div id="status" class="status-msg"></div>

      <div class="link-text">
        Don't have an account? <a href="signup.html">Create Account</a>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://evsknkezkbramsnzisvn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3f9t-xXsEqWntgPm9fz-ow_m7fMVt5b";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleSignIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const status = document.getElementById('status');

      if (!email || !password) {
        status.innerText = "Please enter both email and password.";
        return;
      }

      status.style.color = "white";
      status.innerText = "Logging in...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        status.style.color = "#f87171";
        status.innerText = error.message;
      } else {
        // Redirect to dashboard upon successful login
        window.location.href = "index.html";
      }
    }

    // Auto-redirect if already logged in
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "index.html";
    });
  </script>
</body>
</html>
